<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burger Builder Kiosk</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- Handlebars -->
  <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.min.js"></script>
</head>
<body class="bg-light">

  <div class="container py-4">
    <!-- Header -->
    <header class="text-center mb-4">
      <h1 class="fw-bold">Burger Builder Kiosk</h1>
      <p class="text-muted">Build your burger step by step</p>
    </header>

    <div class="row g-4">
      <!-- Main Dynamic View -->
      <main class="col-lg-8">
        <div id="app" class="card shadow-sm p-4">
          <!-- Handlebars views will render here -->
        </div>
      </main>

      <!-- Live Order Summary -->
      <aside class="col-lg-4">
        <div class="card shadow-sm p-4">
          <h2 class="h4 mb-3">Your Order</h2>
          <div id="summary">
            <p><strong>Name:</strong> <span id="summaryName">-</span></p>
            <p><strong>Burger Base:</strong> <span id="summaryBase">-</span></p>
            <p><strong>Bun:</strong> <span id="summaryBun">-</span></p>
            <p><strong>Protein:</strong> <span id="summaryProtein">-</span></p>
            <p><strong>Toppings:</strong> <span id="summaryToppings">-</span></p>
            <p><strong>Sauces:</strong> <span id="summarySauces">-</span></p>
            <p><strong>Extras:</strong> <span id="summaryExtras">-</span></p>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- =========================
       HANDLEBARS TEMPLATES
  ========================== -->

  <!-- Home / Start View -->
  <script id="home-template" type="text/x-handlebars-template">
    <div class="text-center">
      <h2 class="mb-3">Welcome!</h2>
      <p class="text-muted">Enter your name and choose a burger to begin.</p>

      <form id="startForm" class="mb-4">
        <div class="mb-3">
          <input
            type="text"
            id="customerName"
            class="form-control"
            placeholder="Enter your name"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary">Start Order</button>
      </form>

      <div class="row g-3">
        {{#each burgers}}
          <div class="col-md-6">
            <div class="card h-100 shadow-sm">
              <img src="{{image}}" class="card-img-top" alt="{{name}}">
              <div class="card-body">
                <h3 class="h5">{{name}}</h3>
                <p class="text-muted">{{description}}</p>
                <button class="btn btn-outline-dark select-burger-btn" data-id="{{id}}">
                  Select
                </button>
              </div>
            </div>
          </div>
        {{/each}}
      </div>
    </div>
  </script>

  <!-- Step View -->
  <script id="step-template" type="text/x-handlebars-template">
    <div>
      <h2 class="mb-3">{{title}}</h2>
      <p class="text-muted">{{prompt}}</p>

      <!-- Multiple Choice Buttons -->
      {{#if isButtonStep}}
        <div class="d-flex flex-wrap gap-2 mt-3">
          {{#each options}}
            <button class="btn btn-outline-primary option-btn" data-value="{{this}}">
              {{this}}
            </button>
          {{/each}}
        </div>
      {{/if}}

      <!-- Text Input -->
      {{#if isTextStep}}
        <form id="textStepForm" class="mt-3">
          <div class="mb-3">
            <input
              type="text"
              class="form-control"
              id="textStepInput"
              placeholder="{{placeholder}}"
            />
          </div>
          <button type="submit" class="btn btn-primary">Continue</button>
        </form>
      {{/if}}

      <!-- Image Selection -->
      {{#if isImageStep}}
        <div class="row g-3 mt-2">
          {{#each options}}
            <div class="col-md-4">
              <div class="card h-100 shadow-sm image-option-card option-image-btn" data-value="{{label}}">
                <img src="{{image}}" class="card-img-top" alt="{{label}}">
                <div class="card-body text-center">
                  <p class="mb-0 fw-semibold">{{label}}</p>
                </div>
              </div>
            </div>
          {{/each}}
        </div>
      {{/if}}

      <div class="mt-4">
        <button id="skipStepBtn" class="btn btn-secondary">Skip Step</button>
      </div>
    </div>
  </script>

  <!-- Confirmation View -->
  <script id="confirmation-template" type="text/x-handlebars-template">
    <div class="text-center py-5">
      <h2>{{message}}</h2>
    </div>
  </script>

  <!-- Feedback View -->
  <script id="feedback-template" type="text/x-handlebars-template">
    <div class="text-center">
      <h2 class="mb-3">Heads up!</h2>
      <p>{{message}}</p>
      <button id="gotItBtn" class="btn btn-warning mt-3">Got it</button>
    </div>
  </script>

  <!-- Final View -->
  <script id="final-template" type="text/x-handlebars-template">
    <div class="text-center">
      <h2 class="mb-3">{{message}}</h2>

      <div class="card mt-4 text-start">
        <div class="card-body">
          <p><strong>Name:</strong> {{order.name}}</p>
          <p><strong>Burger Base:</strong> {{order.base}}</p>
          <p><strong>Bun:</strong> {{order.bun}}</p>
          <p><strong>Protein:</strong> {{order.protein}}</p>
          <p><strong>Toppings:</strong> {{order.toppings}}</p>
          <p><strong>Sauces:</strong> {{order.sauces}}</p>
          <p><strong>Extras:</strong> {{order.extras}}</p>
        </div>
      </div>

      <div class="mt-4 d-flex justify-content-center gap-3">
        <button id="restartOrderBtn" class="btn btn-primary">Restart Order</button>
        <button id="goHomeBtn" class="btn btn-outline-dark">Main Page</button>
      </div>
    </div>
  </script>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- Your MVC Files -->
  <script src="model.js"></script>
  <script src="view.js"></script>
  <script src="controller.js"></script>
</body>
</html>
