<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burger Builder Kiosk</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Google Font -->
 

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1f1f1f, #2e2e2e);
      min-height: 100vh;
    }

    .kiosk-header {
      background: linear-gradient(90deg, #d62828, #f77f00);
      color: white;
      border-bottom: 4px solid #ffcf56;
    }

    .kiosk-header h1 {
      font-weight: 800;
      letter-spacing: 1px;
    }

    .main-kiosk-card {
      border: none;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
    }

    .main-screen {
      min-height: 650px;
      background: #fffaf3;
      padding: 2rem;
    }

    .summary-card {
      border: none;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
    }

    .summary-header {
      background: #ffcf56;
      color: #212529;
      font-weight: 700;
      text-align: center;
      padding: 1rem;
      font-size: 1.3rem;
    }

    .summary-body {
      background: white;
      min-height: 350px;
      padding: 1.5rem;
    }

    .burger-card {
      border: none;
      border-radius: 18px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      height: 100%;
    }

    .burger-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
    }

    .burger-card img,
    .image-option-card img {
      height: 220px;
      object-fit: cover;
    }

    .choice-btn,
    .select-burger-btn,
    .image-choice-btn,
    .kiosk-btn {
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.9rem 1rem;
    }

    .welcome-box {
      max-width: 650px;
      margin: 0 auto;
      text-align: center;
      padding-top: 3rem;
    }

    .welcome-box h2 {
      font-size: 2.3rem;
      font-weight: 800;
      color: #d62828;
    }

    .welcome-box p {
      font-size: 1.1rem;
      color: #555;
    }

    .image-option-card {
      border: none;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s ease;
    }

    .image-option-card:hover {
      transform: scale(1.02);
    }

    .step-title {
      font-weight: 800;
      color: #d62828;
    }

    .step-subtitle {
      color: #555;
      margin-bottom: 1.5rem;
    }

    .summary-label {
      font-weight: 700;
      color: #d62828;
    }

    .summary-empty {
      color: #777;
      font-style: italic;
    }

    .list-group-item {
      border-radius: 10px !important;
      margin-bottom: 8px;
      border: 1px solid #eee;
    }

    .confirmation-screen,
    .feedback-screen,
    .final-screen {
      min-height: 420px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    .confirmation-screen h2 {
      color: #198754;
      font-weight: 800;
      font-size: 2rem;
    }

    .feedback-screen h2 {
      color: #f77f00;
      font-weight: 800;
    }

    .final-screen h1 {
      font-weight: 800;
      color: #d62828;
    }

    .touch-input {
      border-radius: 14px;
      padding: 0.95rem 1rem;
      font-size: 1.1rem;
    }

    @media (max-width: 991px) {
      .main-screen {
        min-height: auto;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="kiosk-header py-4 text-center shadow">
    <div class="container">
      <h1 class="display-5 mb-1">Burger Builder Kiosk</h1>
      <p class="mb-0 fs-5">Build your burger your way</p>
    </div>
  </header>

  <!-- Main layout -->
  <div class="container-fluid py-4">
    <div class="row g-4 justify-content-center">

      <!-- Main app panel -->
      <div class="col-xl-8 col-lg-8">
        <div class="card main-kiosk-card">
          <div class="main-screen" id="app">
            <!-- Dynamic content will render here -->
          </div>
        </div>
      </div>

      <!-- Order summary -->
      <div class="col-xl-3 col-lg-4">
        <div class="card summary-card sticky-top" style="top: 20px;">
          <div class="summary-header">Your Order</div>
          <div class="summary-body" id="summary-panel">
            <!-- Summary template renders here -->
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ========================= -->
  <!-- HANDLEBARS TEMPLATES -->
  <!-- ========================= -->

  <!-- Start Template -->
  <script id="start-template" type="text/x-handlebars-template">
    <div class="welcome-box">
      <h2>Welcome to Burger Builder</h2>
      <p class="mt-3 mb-4">
        Create your perfect burger with a fun step-by-step ordering experience.
      </p>

      <div class="card border-0 shadow-sm rounded-4 p-4 bg-white">
        <h4 class="mb-3 fw-bold">Start Your Order</h4>
        <form id="name-form" class="mx-auto" style="max-width: 420px;">
          <div class="mb-3">
            <input
              type="text"
              id="customer-name"
              class="form-control touch-input"
              placeholder="Enter your name"
              required
            >
          </div>
          <button type="submit" class="btn btn-danger w-100 kiosk-btn">
            Begin
          </button>
        </form>
      </div>
    </div>
  </script>

  <!-- Menu Template -->
  <script id="menu-template" type="text/x-handlebars-template">
    <div>
      <div class="text-center mb-4">
        <h2 class="step-title">Hi, {{name}}!</h2>
        <p class="step-subtitle">Choose your burger base to begin customizing.</p>
      </div>

      <div class="row g-4">
        {{#each burgers}}
          <div class="col-md-6">
            <div class="card burger-card">
              <img src="{{image}}" class="card-img-top" alt="{{title}}">
              <div class="card-body text-center p-4">
                <h4 class="fw-bold">{{title}}</h4>
                <p class="text-muted">{{description}}</p>
                <button
                  class="btn btn-danger btn-lg w-100 select-burger-btn"
                  data-id="{{id}}">
                  Select This Burger
                </button>
              </div>
            </div>
          </div>
        {{/each}}
      </div>
    </div>
  </script>

  <!-- Step Template -->
  <script id="step-template" type="text/x-handlebars-template">
    <div>
      <div class="text-center mb-4">
        <h2 class="step-title">{{instruction}}</h2>
        <p class="step-subtitle">Make your selection to continue building your burger.</p>
      </div>

      {{#if isMultipleChoice}}
        <div class="row g-3">
          {{#each options}}
            <div class="col-md-6">
              <button
                class="btn btn-outline-danger w-100 choice-btn"
                data-value="{{this}}">
                {{this}}
              </button>
            </div>
          {{/each}}
        </div>
      {{/if}}

      {{#if isText}}
        <form id="text-step-form" class="mx-auto mt-4" style="max-width: 450px;">
          <div class="mb-3">
            <input
              type="text"
              id="text-answer"
              class="form-control touch-input"
              placeholder="Type your answer here"
              required
            >
          </div>
          <button type="submit" class="btn btn-danger w-100 kiosk-btn">
            Continue
          </button>
        </form>
      {{/if}}

      {{#if isImageSelection}}
        <div class="row g-4 mt-1">
          {{#each imageOptions}}
            <div class="col-md-4">
              <div class="card image-option-card h-100">
                <img src="{{url}}" class="card-img-top" alt="{{label}}">
                <div class="card-body text-center">
                  <h5 class="fw-bold">{{label}}</h5>
                  <button
                    class="btn btn-outline-dark w-100 image-choice-btn"
                    data-value="{{label}}">
                    Choose
                  </button>
                </div>
              </div>
            </div>
          {{/each}}
        </div>
      {{/if}}
    </div>
  </script>

  <!-- Confirmation Template -->
  <script id="confirmation-template" type="text/x-handlebars-template">
    <div class="confirmation-screen">
      <h2>{{message}}</h2>
      <p class="text-muted mt-2">Moving to the next step...</p>
    </div>
  </script>

  <!-- Feedback Template -->
  <script id="feedback-template" type="text/x-handlebars-template">
    <div class="feedback-screen">
      <h2>Quick Note</h2>
      <p class="lead mt-3 mb-4">{{message}}</p>
      <div class="mx-auto" style="max-width: 250px;">
        <button id="got-it-btn" class="btn btn-warning w-100 kiosk-btn">
          Got it
        </button>
      </div>
    </div>
  </script>

  <!-- Final Template -->
  <script id="final-template" type="text/x-handlebars-template">
    <div class="final-screen">
      <h1>{{finalMessage}}</h1>
      <div class="d-flex flex-wrap justify-content-center gap-3 mt-4">
        <button id="restart-btn" class="btn btn-danger kiosk-btn px-4">
          Restart Order
        </button>
        <button id="home-btn" class="btn btn-secondary kiosk-btn px-4">
          Return to Main Page
        </button>
      </div>
    </div>
  </script>

  <!-- Summary Template -->
  <script id="summary-template" type="text/x-handlebars-template">
    <div class="mb-3">
      <div><span class="summary-label">Name:</span> {{name}}</div>
      <div class="mt-2"><span class="summary-label">Burger Base:</span> {{burgerBase}}</div>
    </div>

    <hr>

    <h5 class="fw-bold mb-3">Selections</h5>

    {{#if selections.length}}
      <ul class="list-group">
        {{#each selections}}
          <li class="list-group-item">
            <strong>{{step}}:</strong> {{value}}
          </li>
        {{/each}}
      </ul>
    {{else}}
      <p class="summary-empty">No selections yet.</p>
    {{/if}}
  </script>

  <!-- Handlebars -->
  <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.min.js"></script>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- Your JS files -->
  <script src="js/model.js"></script>
  <script src="js/view.js"></script>
  <script src="js/controller.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
